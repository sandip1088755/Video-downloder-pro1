name: Build Release APK & AAB

# Trigger manually from the GitHub app/website, or automatically on every push to main.
on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # The gradle-wrapper.jar binary is not committed to this repo (it can't be produced
      # in a text-only environment). This step generates it fresh using a pinned Gradle
      # version, then all subsequent steps use the normal ./gradlew wrapper.
      - name: Generate Gradle wrapper
        uses: gradle/actions/setup-gradle@v4
      - run: gradle wrapper --gradle-version 8.9
      - run: chmod +x ./gradlew

      # Only runs if you've added the four secrets below in
      # Repo Settings -> Secrets and variables -> Actions.
      # Without them, the app still builds, just signed with the debug key.
      - name: Decode signing keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore
          cat > keystore.properties <<EOF
          storeFile=release.keystore
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Build release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Build release AAB
        run: ./gradlew bundleRelease --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/*.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: app/build/outputs/bundle/release/*.aab
